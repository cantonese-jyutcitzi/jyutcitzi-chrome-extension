# Attach a dereferenced extension zip to each GitHub Release (submodules → real files).
name: Release extension zip

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build store package
        run: bash scripts/build-extension-dist.sh

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: jyutcitzi-chrome-extension-dist.zip
